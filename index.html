<!DOCTYPE HTML>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <title>maxstellar</title>
    </head>
    <body>
        <div id="starfield"></div>
        <div class="everythingelse">
            <div class="whoami">
            <img class="pfp" src="maxstellar.png">
            <h1>hi, i'm <strong>maxstellar</strong>, and i make silly things!</h1>
            </div>
        </div>

        <!-- used ai here, sorry :< would have made it myself but the mockup looked too good-->
        <script>
            const field = document.getElementById('starfield');
            for (let i = 0; i < 130; i++) {
              const star = document.createElement('div');
              star.className = 'star';
              const size = Math.random() < 0.8 ? Math.random() * 1.5 + 0.5 : Math.random() * 2.5 + 1;
              star.style.cssText = `
                width:${size}px; height:${size}px;
                left:${Math.random()*100}%;
                top:${Math.random()*100}%;
                --dur:${2.5 + Math.random()*4}s;
                --delay:${Math.random()*5}s;
                --bright:${0.3 + Math.random()*0.6};
              `;
              // Occasionally make a yellow star
              if (Math.random() < 0.08) star.style.background = '#F5E97A';
              field.appendChild(star);
            }
            
            // Subtle sticker wobble on page load
            document.querySelectorAll('.sticker').forEach((s, i) => {
              s.style.animationDelay = `${i * 0.12}s`;
              s.style.animation = `stickerPop 0.5s ${i * 0.12 + 0.4}s cubic-bezier(0.34,1.56,0.64,1) both`;
            });
            const styleEl = document.createElement('style');
            styleEl.textContent = `
              @keyframes stickerPop {
                from { opacity:0; transform: scale(0.6) rotate(var(--r, 0deg)); }
                to   { opacity:1; }
              }
            `;
            document.head.appendChild(styleEl);
        </script>
    </body>
</html>
