<!doctype html>
<html>
  <head>
    <title>Rowan</title>
    <link rel="icon" type="image/x-icon" href="transgender_flag.png" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <img
      id="rowan"
      style="width: 100vw; height: 100vh; object-fit: fill; display: block"
    />
    <script>
      const rowan = document.getElementById("rowan");
      let lastrowan = null;
      function randomize() {
        let toBeRowan =
          "pics/" + Math.floor(Math.random() * 6).toString() + ".jpg";
        if (lastrowan) {
          while (true) {
            if (toBeRowan == lastrowan) {
              toBeRowan =
                "pics/" + Math.floor(Math.random() * 6).toString() + ".jpg";
            } else {
              break;
            }
          }
        }
        rowan.src = toBeRowan;
        lastrowan = toBeRowan;
      }
      randomize();
      document.addEventListener("click", randomize);
      document.addEventListener("keypress", (event) => {
        if (event.key == " ") {
          randomize();
        }
      });
    </script>
  </body>
</html>
