<!doctype html>
<html>
  <head>
    <title>Rowan - Music Lab</title>
    <link rel="icon" type="image/x-icon" href="../transgender_flag.png" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }

      .away-with-you {
        opacity: 0 !important;
      }

      #controls {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100vw;
        height: 8vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2vw;
        box-sizing: border-box;
        background: #000000aa;
        font-family: Comic Sans MS;
        font-size: 2.5vh;
        color: white;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
      }

      #controls:hover,
      #controls.peek {
        opacity: 1;
      }

      #controls button {
        background: none;
        border: 0.3vh solid white;
        color: white;
        font-family: Comic Sans MS;
        font-size: 2.5vh;
        cursor: pointer;
        padding: 0.5vh 2vw;
        border-radius: 1vh;
      }

      #controls input[type="range"] {
        width: 15vw;
        height: 0.8vh;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div
      id="rowan-is-a-good-girl"
      style="
        opacity: 1;
        transition: opacity 0.5s;
        position: absolute;
        top: 0;
        left: 0;
        height: 100vh;
        width: 100vw;
        font-size: 7vw;
        font-family: Comic Sans MS;
        background-color: #000000bb;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      "
    >
      <p id="i-support-transgender-individuals">click to begin</p>
    </div>
    <div id="controls" style="display: none">
      <button id="pause">pause</button>
      <span>vol</span>
      <input id="vol-slider" type="range" min="0" max="100" value="100" />
    </div>
    <canvas
      id="rowan"
      style="display: block; z-index: -1; position: absolute; bottom: 0"
    />
    <script>
      const intro = document.getElementById("rowan-is-a-good-girl");
      const introtext = document.getElementById(
        "i-support-transgender-individuals",
      );
      const rowan = document.getElementById("rowan");
      const ctx = rowan.getContext("2d");
      const roroimg = new Image();
      let sussybaka = false;
      roroimg.src =
        "../pics/" + Math.floor(Math.random() * 6).toString() + ".jpg";
      roroimg.onload = () => {
        rowan.width = window.innerWidth;
        rowan.height = window.innerHeight * 0.95;
        ctx.drawImage(roroimg, 0, 0, rowan.width, rowan.height);
      };

      let lastrowan = null;
      function randomize() {
        let toBeRowan =
          "../pics/" + Math.floor(Math.random() * 6).toString() + ".jpg";
        if (lastrowan) {
          while (true) {
            if (toBeRowan == lastrowan) {
              toBeRowan =
                "../pics/" + Math.floor(Math.random() * 6).toString() + ".jpg";
            } else {
              break;
            }
          }
        }
        roroimg.src = toBeRowan;
        lastrowan = toBeRowan;
      }
      const pause = document.getElementById("pause");
      const volSlider = document.getElementById("vol-slider");
      const controls = document.getElementById("controls");
      let audio_ctx = null;

      pause.addEventListener("click", (e) => {
        e.stopPropagation();
        if (!audio_ctx) return;
        if (audio_ctx.state === "running") {
          controls.classList.add("peek");
          audio_ctx.suspend();
          pause.textContent = "play";
        } else {
          controls.classList.remove("peek");
          audio_ctx.resume();
          pause.textContent = "pause";
        }
      });

      volSlider.addEventListener("input", (e) => {
        e.stopPropagation();
        if (gainNode) gainNode.gain.value = e.target.value / 100;
      });

      let gainNode = null;

      intro.addEventListener("click", async () => {
        if (sussybaka) {
          if (intro.classList.contains("away-with-you")) {
            randomize();
          }
          return;
        }
        sussybaka = true;
        introtext.innerHTML = "starting...";
        audio_ctx = new AudioContext();
        const analyzer = audio_ctx.createAnalyser();
        analyzer.fftSize = 32;
        gainNode = audio_ctx.createGain();
        gainNode.gain.value = volSlider.value / 100;
        const source = audio_ctx.createBufferSource();
        const response = await fetch("rowan_theme_song.mp3");
        const arrayBuffer = await response.arrayBuffer();
        const decodedBuffer = await audio_ctx.decodeAudioData(arrayBuffer);

        source.buffer = decodedBuffer;
        source.loop = true;
        source.connect(analyzer);
        analyzer.connect(gainNode);
        gainNode.connect(audio_ctx.destination);
        source.start();
        controls.style.display = "flex";
        controls.classList.add("peek");
        setTimeout(() => controls.classList.remove("peek"), 1000);

        const data = new Uint8Array(analyzer.frequencyBinCount);

        function draw() {
          requestAnimationFrame(draw);
          ctx.clearRect(0, 0, rowan.width, rowan.height);
          rowan.width = window.innerWidth;
          rowan.height = window.innerHeight * 0.95;
          analyzer.getByteFrequencyData(data);
          sliceWidth = rowan.width / 7;
          for (let i = 0; i < 7; i++) {
            mult = data[i * 2] / 255 / 1.1;
            ctx.drawImage(
              roroimg,
              i * (roroimg.naturalWidth / 7),
              roroimg.naturalHeight - roroimg.naturalHeight * mult,
              roroimg.naturalWidth / 7,
              roroimg.naturalHeight * mult,
              i * sliceWidth,
              rowan.height - rowan.height * mult,
              sliceWidth,
              rowan.height * mult,
            );
          }
        }
        intro.classList.add("away-with-you");
        draw();
      });
    </script>
  </body>
</html>
